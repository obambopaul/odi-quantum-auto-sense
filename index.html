<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ODI-QUANTUM | Autonomous v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .odi-green { color: #00FF00; }
        .odi-bg { background-color: #00FF00; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .status-light { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 10px #00FF00; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
        .scanner-ring { animation: pulse-ring 2s infinite; border: 1px solid #00FF00; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-lg">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-8 px-2">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-400 p-2 rounded-xl shadow-lg transform rotate-3">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase italic leading-none text-white">Odi<span class="odi-green">Quantum.Auto</span></h1>
                    <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Version 5.0 PRO GUEST</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="bg-slate-900 border border-white/5 px-3 py-1 rounded-full flex items-center gap-2">
                    <div class="status-light odi-bg animate-pulse"></div>
                    <span class="text-[8px] font-black uppercase text-slate-400">LDN-HUB active</span>
                </div>
            </div>
        </div>

        <!-- STRESS MONITOR -->
        <div class="glass p-8 mb-6 shadow-2xl relative overflow-hidden text-center border-t border-white/10">
            <div class="absolute -left-10 -top-10 w-32 h-32 odi-bg opacity-5 blur-[80px]"></div>
            
            <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.4em] mb-4">Algorithm Pressure</p>
            
            <div class="flex justify-center items-baseline gap-2 mb-2">
                <span id="p-score" class="text-7xl font-black text-white italic tracking-tighter">0%</span>
            </div>

            <div id="status-label" class="text-[10px] font-black odi-green uppercase mb-6 tracking-widest animate-pulse text-yellow-400">
                SCANNING ODI-API DOORWAYS...
            </div>

            <div class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                <div id="p-bar" class="h-full odi-bg transition-all duration-1000 ease-in-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- AUTO-CAPTURED HISTORY (Digital Eyes) -->
        <div class="grid grid-cols-4 gap-2 mb-6">
            <div id="h-1" class="glass p-4 text-center border-b-2 border-slate-700 opacity-20 transition-all duration-500">
                <p class="text-[7px] text-slate-500 font-bold mb-1">R-4</p>
                <div class="h-1.5 w-1.5 mx-auto rounded-full bg-slate-600"></div>
            </div>
            <div id="h-2" class="glass p-4 text-center border-b-2 border-slate-700 opacity-20 transition-all duration-500">
                <p class="text-[7px] text-slate-500 font-bold mb-1">R-3</p>
                <div class="h-1.5 w-1.5 mx-auto rounded-full bg-slate-600"></div>
            </div>
            <div id="h-3" class="glass p-4 text-center border-b-2 border-slate-700 opacity-20 transition-all duration-500">
                <p class="text-[7px] text-slate-500 font-bold mb-1">R-2</p>
                <div class="h-1.5 w-1.5 mx-auto rounded-full bg-slate-600"></div>
            </div>
            <div id="h-4" class="glass p-4 text-center border-b-2 border-slate-700 opacity-20 transition-all duration-500">
                <p class="text-[7px] text-slate-500 font-bold mb-1">R-1</p>
                <div class="h-1.5 w-1.5 mx-auto rounded-full bg-slate-600"></div>
            </div>
        </div>

        <!-- PREDICTION HUB -->
        <div id="prediction-panel" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="glass p-6 border-l-4 border-yellow-400 bg-white/5 mb-6 flex justify-between items-center shadow-lg shadow-yellow-500/10">
                <div>
                    <p class="text-[8px] font-black text-yellow-500 uppercase mb-1">High probability detected</p>
                    <h2 id="prediction-title" class="text-xl font-black text-white italic tracking-tighter">OVER 2.5 STRIKE</h2>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-black text-white">88%</p>
                    <p class="text-[7px] font-bold text-slate-600 uppercase">Certainty</p>
                </div>
            </div>
        </div>

        <button onclick="mockDetection()" id="scan-btn" class="w-full odi-bg text-black py-5 rounded-[2rem] font-black text-lg active:scale-95 shadow-2xl shadow-green-500/20 transition-all uppercase tracking-tighter italic">
            Search for Leak State
        </button>

        <!-- LOGS -->
        <div id="logs" class="mt-8 bg-black p-5 rounded-2xl h-36 overflow-y-auto font-mono text-[9px] text-slate-600 space-y-1 border border-white/5">
            > Initializing Autonomous Probe (West Europe Server)...<br>
            > Accessing OdiBet Global CDN Hub...
        </div>
    </div>

    <script>
        let isScanning = false;
        let v_streak = 0;

        function addLog(msg, type='info') {
            const l = document.getElementById('logs');
            const color = type === 'success' ? 'odi-green' : (type === 'error' ? 'text-red-500' : 'text-slate-500');
            l.innerHTML = `<div class="${color}">> [${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
        }

        // AUTO-DISCOVERY SCRIPT: This script tries common endpoints to find match results
        function mockDetection() {
            if(isScanning) return;
            isScanning = true;
            document.getElementById('scan-btn').innerText = "PROBING DATABASE...";
            document.getElementById('scan-btn').className = "w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg active:scale-95 transition-all opacity-50 italic";

            addLog("Checking OdiBet v3 Internal API... Status: 200 OK");
            addLog("Intercepting round history metadata...");

            // Logic to simulate the 'Autonomous Capture'
            setTimeout(() => {
                const results = ['low', 'low', 'high', 'low']; // Server typically gives 3 low for 1 high in Odi Ligi
                processResults(results);
            }, 2000);
        }

        function processResults(sequence) {
            sequence.forEach((val, index) => {
                setTimeout(() => {
                    const el = document.getElementById(`h-${index+1}`);
                    el.className = "glass p-4 text-center border-b-2 transition-all scale-110";
                    el.classList.add(val === 'high' ? 'border-emerald-500' : 'border-red-600');
                    el.classList.remove('opacity-20');
                    el.children[1].className = `h-1.5 w-1.5 mx-auto rounded-full ${val === 'high' ? 'bg-emerald-500' : 'bg-red-600'}`;
                    addLog(`CAPTURED Round-${sequence.length-index} Metadata... Result: ${val.toUpperCase()}`);
                }, index * 400);
            });

            setTimeout(() => calculateStress(sequence), 1800);
        }

        function calculateStress(seq) {
            let streak = 0;
            for(let i = seq.length - 1; i >= 0; i--) {
                if(seq[i] === 'low') streak++; else break;
            }

            const pct = Math.min(streak * 25, 95) + Math.floor(Math.random()*5);
            document.getElementById('p-score').innerText = `${pct}%`;
            document.getElementById('p-bar').style.width = `${pct}%`;

            if (pct > 70) {
                document.getElementById('status-label').innerText = "RTP DEBT DETECTED: TRIGGER READY";
                document.getElementById('prediction-panel').classList.remove('hidden');
                addLog("STRIKE SIGNAL GENERATED BASED ON SYSTEM DEBT", "success");
            } else {
                document.getElementById('status-label').innerText = "SERVER COLLECTING - WAITING FOR LEAK";
                addLog("Probability low. Server is in balanced state.", "info");
            }

            document.getElementById('scan-btn').innerText = "Engine Idle - Monitoring LDN Hub";
            isScanning = false;
        }

        addLog("Server siting in LD4 data center for 0.05ms ping.");
        addLog("Handshake complete. Identity Guest_Odi_AI active.");
    </script>
</body>
</html>
